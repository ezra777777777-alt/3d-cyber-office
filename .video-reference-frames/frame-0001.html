<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1020;
      }
      #stage {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1020;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        background: #0b1020;
      }
      .badge {
        position: fixed;
        left: 14px;
        bottom: 12px;
        color: white;
        font: 13px/1.4 ui-monospace, Consolas, monospace;
        background: rgb(0 0 0 / 0.48);
        border: 1px solid rgb(255 255 255 / 0.22);
        border-radius: 6px;
        padding: 6px 8px;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="canvas" width="1280" height="720"></canvas>
    </div>
    <div class="badge">80544d79e411454c4dea49ebb08172af.mp4 @ 1s</div>
    <video id="video" muted playsinline preload="auto" crossorigin="anonymous" src="file:///D:/cx/app/wx/wx%20token/xwechat_files/wxid_4z1lhda6zv5g22_312b/temp/RWTemp/2026-05/9882a54450002ef4053b315c59d9291f/80544d79e411454c4dea49ebb08172af.mp4" style="display:none"></video>
    <script>
      const targetTime = 1;
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      function drawFrame() {
        const vw = video.videoWidth || 1280;
        const vh = video.videoHeight || 720;
        const scale = Math.min(canvas.width / vw, canvas.height / vh);
        const dw = vw * scale;
        const dh = vh * scale;
        const dx = (canvas.width - dw) / 2;
        const dy = (canvas.height - dh) / 2;
        ctx.fillStyle = '#0b1020';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, dx, dy, dw, dh);
        document.title = 'ready';
      }

      video.addEventListener('loadedmetadata', () => {
        video.currentTime = Math.min(targetTime, Math.max(0, video.duration - 0.1));
      }, { once: true });

      video.addEventListener('seeked', () => {
        drawFrame();
      }, { once: true });

      video.addEventListener('error', () => {
        document.body.insertAdjacentHTML('beforeend', '<pre style="color:red;position:fixed;top:20px;left:20px">video error</pre>');
        document.title = 'error';
      });
    </script>
  </body>
</html>
